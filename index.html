<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timbre and Distortion Lab</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; margin: 0; font-family: 'Inter', sans-serif; }
        input[type="range"] { cursor: pointer; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SineIcon = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M2 12c2-8 6-8 8 0s6 8 10 0" />
            </svg>
        );

        const GuitarIcon = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M9 18V5l12-2v13" />
                <circle cx="6" cy="18" r="3" />
                <circle cx="18" cy="16" r="3" />
            </svg>
        );

        const OrganIcon = ({ size = 20 }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                <rect x="2" y="14" width="20" height="8" rx="1" />
                <path d="M6 14v4M10 14v4M14 14v4M18 14v4" />
                <rect x="4" y="6" width="16" height="8" rx="1" />
                <path d="M8 6v4M12 6v4M16 6v4" />
                <path d="M2 2h20" />
            </svg>
        );

        const App = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const [drive, setDrive] = useState(1);
            const [clipType, setClipType] = useState('soft'); 
            const [sourceType, setSourceType] = useState('sine'); 
            const [volume, setVolume] = useState(0.4);
            const [freq, setFreq] = useState(230); 
            const [tone, setTone] = useState(12000); 
            const [isEditingFreq, setIsEditingFreq] = useState(false);
            const [tempFreq, setTempFreq] = useState("230"); 

            const audioCtxRef = useRef(null);
            const oscRef = useRef(null);
            const distRef = useRef(null);
            const gainRef = useRef(null);
            const filterRef = useRef(null);
            const analyserRef = useRef(null);
            
            const canvasRef = useRef(null);
            const transferRef = useRef(null);
            const spectrumRef = useRef(null);
            const requestRef = useRef(null);

            const handleFreqSubmit = () => {
                let val = parseFloat(tempFreq);
                if (isNaN(val)) val = 230;
                val = Math.max(20, Math.min(2000, val)); 
                setFreq(val);
                setTempFreq(val.toString());
                setIsEditingFreq(false);
            };

            const getWaveData = (type) => {
                switch (type) {
                    case 'sine': return { real: [0, 1], imag: [0, 0] };
                    case 'organ': return { real: [0, 1, 0.8, 0.5, 0.2, 0.6, 0, 0.4, 0, 0.3], imag: new Float32Array(10).fill(0) };
                    case 'guitar':
                    default: return { real: [0, 1, 0.5, 0.3, 0.2, 0.1, 0.05], imag: new Float32Array(7).fill(0) };
                }
            };

            const initAudio = async () => {
                if (!audioCtxRef.current) {
                    audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
                    const { real, imag } = getWaveData(sourceType);
                    const wave = audioCtxRef.current.createPeriodicWave(new Float32Array(real), new Float32Array(imag));
                    oscRef.current = audioCtxRef.current.createOscillator();
                    distRef.current = audioCtxRef.current.createWaveShaper();
                    filterRef.current = audioCtxRef.current.createBiquadFilter();
                    gainRef.current = audioCtxRef.current.createGain();
                    analyserRef.current = audioCtxRef.current.createAnalyser();
                    oscRef.current.setPeriodicWave(wave);
                    oscRef.current.frequency.setValueAtTime(freq, audioCtxRef.current.currentTime);
                    filterRef.current.type = 'lowpass';
                    filterRef.current.frequency.setValueAtTime(tone, audioCtxRef.current.currentTime);
                    analyserRef.current.fftSize = 2048;
                    oscRef.current.connect(distRef.current);
                    distRef.current.connect(filterRef.current);
                    filterRef.current.connect(gainRef.current);
                    gainRef.current.connect(analyserRef.current);
                    analyserRef.current.connect(audioCtxRef.current.destination);
                    updateDistortionCurve(drive, clipType);
                    gainRef.current.gain.setValueAtTime(volume, audioCtxRef.current.currentTime);
                    oscRef.current.start();
                }
                if (audioCtxRef.current.state === 'suspended') await audioCtxRef.current.resume();
            };

            const togglePlayback = async () => {
                if (isPlaying) {
                    await audioCtxRef.current.suspend();
                    setIsPlaying(false);
                } else {
                    await initAudio();
                    setIsPlaying(true);
                }
            };

            const updateDistortionCurve = (amount, type) => {
                if (!distRef.current) return;
                const n_samples = 44100;
                const curve = new Float32Array(n_samples);
                for (let i = 0; i < n_samples; ++i) {
                    const x = (i * 2) / n_samples - 1;
                    if (type === 'soft') curve[i] = Math.tanh(x * amount);
                    else {
                        const y = x * amount;
                        curve[i] = y > 1 ? 1 : y < -1 ? -1 : y;
                    }
                }
                distRef.current.curve = curve;
            };

            useEffect(() => { if (distRef.current) updateDistortionCurve(drive, clipType); }, [drive, clipType]);
            useEffect(() => {
                if (oscRef.current && audioCtxRef.current) {
                    const { real, imag } = getWaveData(sourceType);
                    const wave = audioCtxRef.current.createPeriodicWave(new Float32Array(real), new Float32Array(imag));
                    oscRef.current.setPeriodicWave(wave);
                }
            }, [sourceType]);
            useEffect(() => { if (gainRef.current) gainRef.current.gain.setTargetAtTime(volume, audioCtxRef.current.currentTime, 0.05); }, [volume]);
            useEffect(() => { if (oscRef.current) oscRef.current.frequency.setTargetAtTime(freq, audioCtxRef.current.currentTime, 0.05); }, [freq]);
            useEffect(() => { if (filterRef.current) filterRef.current.frequency.setTargetAtTime(tone, audioCtxRef.current.currentTime, 0.05); }, [tone]);

            const draw = () => {
                const W = 800; const H = 280;
                
                // 1. Oscilloscope Draw
                if (canvasRef.current) {
                    const ctx = canvasRef.current.getContext('2d');
                    ctx.fillStyle = '#0f172a'; ctx.fillRect(0, 0, W, H);
                    
                    // Grid Lines (X: Time, Y: Amp)
                    ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 1; ctx.setLineDash([2, 2]);
                    ctx.font = '10px monospace'; ctx.fillStyle = '#475569';
                    
                    // Horizontal lines (Amplitude)
                    for(let i=1; i<4; i++) {
                        let y = (H/4) * i;
                        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
                        let label = (1 - (i*0.5)).toFixed(1);
                        ctx.fillText(label, 5, y - 5);
                    }
                    
                    // Vertical lines (Time - approx for 2048 samples @ 44.1k)
                    const totalMs = (2048 / 44100) * 1000;
                    for(let i=1; i<10; i++) {
                        let x = (W/10) * i;
                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
                        ctx.fillText(((totalMs/10)*i).toFixed(1) + 'ms', x + 2, H - 5);
                    }
                    ctx.setLineDash([]);

                    if (analyserRef.current) {
                        const bufferLength = analyserRef.current.frequencyBinCount;
                        const dataArray = new Uint8Array(bufferLength);
                        analyserRef.current.getByteTimeDomainData(dataArray);
                        ctx.lineWidth = 2.5; ctx.strokeStyle = isPlaying ? '#4ade80' : '#475569';
                        ctx.beginPath();
                        let x = 0; let sliceWidth = W / bufferLength;
                        for (let i = 0; i < bufferLength; i++) {
                            const y = (dataArray[i] / 128.0) * (H/2);
                            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                            x += sliceWidth;
                        }
                        ctx.stroke();
                    }
                }

                // 2. Transfer Function Draw
                if (transferRef.current) {
                    const tW = 300; const tH = 200;
                    const tCtx = transferRef.current.getContext('2d');
                    tCtx.fillStyle = '#0f172a'; tCtx.fillRect(0, 0, tW, tH);
                    
                    // Grid
                    tCtx.strokeStyle = '#1e293b'; tCtx.setLineDash([2, 4]);
                    tCtx.beginPath(); tCtx.moveTo(tW/2, 0); tCtx.lineTo(tW/2, tH); tCtx.moveTo(0, tH/2); tCtx.lineTo(tW, tH/2); tCtx.stroke();
                    tCtx.setLineDash([]);
                    tCtx.font = '9px monospace'; tCtx.fillStyle = '#64748b';
                    tCtx.fillText("OUT +1", tW/2 + 5, 12); tCtx.fillText("OUT -1", tW/2 + 5, tH - 5);
                    tCtx.fillText("IN -1", 5, tH/2 - 5); tCtx.fillText("IN +1", tW - 35, tH/2 - 5);

                    tCtx.strokeStyle = '#ef4444'; tCtx.lineWidth = 2; tCtx.beginPath();
                    for(let i=0; i < tW; i++) {
                        let input = (i / tW) * 2 - 1;
                        let output = clipType === 'soft' ? Math.tanh(input * drive) : Math.max(-1, Math.min(1, input * drive));
                        let plotY = ((-output + 1) / 2) * tH;
                        if (i === 0) tCtx.moveTo(i, plotY); else tCtx.lineTo(i, plotY);
                    }
                    tCtx.stroke();
                }

                // 3. Spectrum Draw
                if (spectrumRef.current) {
                    const sW = 400; const sH = 200;
                    const sCtx = spectrumRef.current.getContext('2d');
                    sCtx.fillStyle = '#0f172a'; sCtx.fillRect(0, 0, sW, sH);
                    
                    // Freq Grid
                    sCtx.strokeStyle = '#1e293b'; sCtx.font = '9px monospace'; sCtx.fillStyle = '#475569';
                    const sampleRate = 44100;
                    const labels = [100, 500, 1000, 5000, 10000];
                    labels.forEach(hz => {
                        let x = (hz / (sampleRate/2)) * sW * 10; 
                        if(x < sW) {
                            sCtx.beginPath(); sCtx.moveTo(x, 0); sCtx.lineTo(x, sH); sCtx.stroke();
                            sCtx.fillText(hz < 1000 ? hz + 'Hz' : (hz/1000) + 'k', x + 2, 12);
                        }
                    });

                    if (analyserRef.current) {
                        const bufferLength = analyserRef.current.frequencyBinCount;
                        const freqData = new Uint8Array(bufferLength);
                        analyserRef.current.getByteFrequencyData(freqData);
                        let barWidth = (sW / bufferLength) * 4; let barX = 0;
                        for (let i = 0; i < bufferLength; i++) {
                            const barHeight = (freqData[i] / 255) * sH;
                            sCtx.fillStyle = freqData[i] > 220 ? '#60a5fa' : '#3b82f6';
                            sCtx.fillRect(barX, sH - barHeight, barWidth, barHeight);
                            barX += barWidth + 0.5;
                        }
                    }
                }
                requestRef.current = requestAnimationFrame(draw);
            };

            useEffect(() => { requestRef.current = requestAnimationFrame(draw); return () => cancelAnimationFrame(requestRef.current); }, [isPlaying, drive, clipType]);

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <header className="max-w-5xl mx-auto mb-8 border-b border-slate-800 pb-6">
                        <h1 className="text-3xl font-bold flex items-center gap-3">Timbre & Distortion Lab</h1>
                        <p className="text-slate-400 mt-2 text-sm">Pop Musicology Lab: Analysis of harmonic saturation and non-linear wave shaping.</p>
                    </header>
                    <main className="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 space-y-6">
                            <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Oscilloscope (Time Domain / ms)</h3>
                                <div className="relative border border-slate-700 rounded-lg overflow-hidden">
                                    <canvas ref={canvasRef} width={800} height={280} className="w-full bg-black" />
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                    <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">FFT Spectrum (Frequency / Hz)</h3>
                                    <canvas ref={spectrumRef} width={400} height={200} className="w-full h-44 rounded bg-black border border-slate-700" />
                                </div>
                                <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                                    <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-2 px-1">Transfer Curve (I/O)</h3>
                                    <canvas ref={transferRef} width={300} height={200} className="w-full h-44 rounded bg-black border border-slate-700" />
                                </div>
                            </div>
                        </div>
                        <div className="bg-slate-900 p-6 rounded-xl border border-slate-800 space-y-6 h-fit">
                            <button onClick={togglePlayback} className={`w-full py-4 rounded-lg font-bold transition-all ${isPlaying ? 'bg-red-500/20 text-red-400 border border-red-500/50' : 'bg-blue-600 text-white hover:bg-blue-500'}`}>
                                {isPlaying ? "DISABLE OUTPUT" : "ENABLE SIGNAL"}
                            </button>
                            <div className="space-y-4">
                                <label className="text-xs font-bold uppercase text-slate-500">Harmonic Profile (Source)</label>
                                <div className="grid grid-cols-3 gap-2">
                                    <button onClick={()=>setSourceType('sine')} className={`flex flex-col items-center gap-1 p-2 rounded border text-[10px] transition-colors ${sourceType==='sine'?'bg-blue-600 border-blue-400 text-white':'bg-slate-800 border-slate-700 text-slate-400'}`}><SineIcon /> Sine</button>
                                    <button onClick={()=>setSourceType('guitar')} className={`flex flex-col items-center gap-1 p-2 rounded border text-[10px] transition-colors ${sourceType==='guitar'?'bg-blue-600 border-blue-400 text-white':'bg-slate-800 border-slate-700 text-slate-400'}`}><GuitarIcon size={20} /> Guitar</button>
                                    <button onClick={()=>setSourceType('organ')} className={`flex flex-col items-center gap-1 p-2 rounded border text-[10px] transition-colors ${sourceType==='organ'?'bg-blue-600 border-blue-400 text-white':'bg-slate-800 border-slate-700 text-slate-400'}`}><OrganIcon /> Organ</button>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-2">
                                    <div className="flex justify-between text-xs text-slate-400"><span>Pre-Gain (Drive)</span><span className="text-yellow-500 font-bold">{drive}x</span></div>
                                    <input type="range" min="1" max="50" step="0.5" value={drive} onChange={(e)=>setDrive(parseFloat(e.target.value))} className="w-full accent-yellow-500" />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <button onClick={()=>setClipType('soft')} className={`py-2 text-[10px] rounded border transition-colors ${clipType==='soft'?'bg-yellow-600 text-white border-yellow-400':'bg-slate-800 text-slate-400 border-slate-700'}`}>Soft Clip (Tanh)</button>
                                    <button onClick={()=>setClipType('hard')} className={`py-2 text-[10px] rounded border transition-colors ${clipType==='hard'?'bg-yellow-600 text-white border-yellow-400':'bg-slate-800 text-slate-400 border-slate-700'}`}>Hard Clip (Lim)</button>
                                </div>
                            </div>
                            <div className="space-y-4 pt-4 border-t border-slate-800">
                                <div className="bg-slate-950/50 p-3 rounded-lg border border-slate-800">
                                    <div className="flex justify-between items-center text-xs text-slate-400 mb-2">
                                        <span>Fundamental Frequency</span>
                                        {isEditingFreq ? (
                                            <div className="flex items-center gap-1">
                                                <input 
                                                    autoFocus
                                                    type="text"
                                                    className="w-16 bg-slate-800 border border-blue-500 text-blue-400 font-mono text-center rounded px-1"
                                                    value={tempFreq}
                                                    onChange={(e) => setTempFreq(e.target.value)}
                                                    onBlur={handleFreqSubmit}
                                                    onKeyDown={(e) => e.key === 'Enter' && handleFreqSubmit()}
                                                />
                                                <span className="text-[10px] text-slate-500 font-mono">Hz</span>
                                            </div>
                                        ) : (
                                            <button 
                                                onClick={() => { setIsEditingFreq(true); setTempFreq(freq.toString()); }}
                                                className="flex items-center gap-1 hover:text-blue-400 transition-colors bg-slate-800/50 px-2 py-0.5 rounded border border-slate-700"
                                            >
                                                <span className="text-blue-400 font-mono font-bold">{freq} Hz</span>
                                                <span className="text-[10px] opacity-50">✎</span>
                                            </button>
                                        )}
                                    </div>
                                    <input 
                                        type="range" min="60" max="880" step="1" 
                                        value={freq} 
                                        onChange={(e) => {
                                            const v = parseInt(e.target.value);
                                            setFreq(v);
                                            setTempFreq(v.toString());
                                        }} 
                                        className="w-full h-2 bg-slate-800 rounded-lg appearance-none accent-blue-500" 
                                    />
                                </div>
                                <div className="space-y-2">
                                    <div className="flex justify-between text-[10px] text-slate-400"><span>Main Out</span><span>{(volume * 100).toFixed(0)}%</span></div>
                                    <input type="range" min="0" max="1" step="0.01" value={volume} onChange={(e)=>setVolume(parseFloat(e.target.value))} className="w-full accent-slate-500" />
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
